services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - '5238:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./nse-academy-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3011:3011'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nse_academy_api
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRY: 7d
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      CMS_URL: http://cms:1337
      CMS_API_TOKEN: ${CMS_API_TOKEN:-}
      WEB_URL: ${WEB_URL:-http://localhost:3010}
      GA_PROPERTY_ID: ${GA_PROPERTY_ID:-}
      GA_CLIENT_EMAIL: ${GA_CLIENT_EMAIL:-}
      GA_PRIVATE_KEY: ${GA_PRIVATE_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash-latest}
      RAPID_API_KEY: ${RAPID_API_KEY:-}
      PORT: 3011
    depends_on:
      postgres:
        condition: service_healthy

  cms:
    build:
      context: ./nse-academy-cms
      dockerfile: Dockerfile
      args:
        STRAPI_ADMIN_NSE_API_URL: https://nseacademy-api.vitaldigitalmedia.net
        STRAPI_ADMIN_NSE_KEY: ${NSE_ADMIN_KEY}
    restart: unless-stopped
    ports:
      - '1337:1337'
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: nse_academy_cms
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      APP_KEYS: ${STRAPI_APP_KEYS:-key1,key2,key3,key4}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:-changeme}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:-changeme}
      JWT_SECRET: ${STRAPI_JWT_SECRET:-changeme}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT:-changeme}
      ENCRYPTION_KEY: ${STRAPI_ENCRYPTION_KEY:-changeme}
      STRAPI_ADMIN_NSE_API_URL: https://nseacademy-api.vitaldigitalmedia.net
      STRAPI_ADMIN_NSE_KEY: ${NSE_ADMIN_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cms_uploads:/opt/app/public/uploads

  web:
    build:
      context: ./nse-academy-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      NEXT_PUBLIC_API_URL: https://nseacademy-api.vitaldigitalmedia.net
      NEXT_PUBLIC_CMS_URL: https://nseacademy-admin.vitaldigitalmedia.net
      CMS_API_TOKEN: ${CMS_API_TOKEN}
      CMS_INTERNAL_URL: http://cms:1337
      API_INTERNAL_URL: http://api:3011
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme}
      NEXTAUTH_URL: https://nseacademy.vitaldigitalmedia.net
    depends_on:
      - api
      - cms

volumes:
  postgres_data:
  cms_uploads:
